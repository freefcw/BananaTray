# BananaTray Dark Theme
# 深色主题配色方案

bg:
  base: "#0a0a0c"
  panel: "#111114"
  subtle: "#1c1c20"
  card: "#1c1c20"
  card_inner: "#151518"
  card_inner_hovered: "#272329"

text:
  primary: "#f4f4f5"
