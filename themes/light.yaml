# BananaTray Light Theme
# 浅色主题配色方案

bg:
  base: "#ffffff"
  panel: "#f6f6f8"
  subtle: "#ececee"
  card: "#f0f0f2"
  card_inner: "#ffffff"
  card_inner_hovered: "#ededef"

text:
  primary: "#18181b"
  secondary: "#71717a"
  muted: "#a1a1aa"
  accent: "#2563eb"
  accent_soft: "#dbeafe"

border:
  subtle: "#e4e4e7"
  strong: "#d0d0d5"

