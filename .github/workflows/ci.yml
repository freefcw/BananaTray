name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  # macOS: 格式检查 + clippy + 单元测试
  rust-checks:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Forbid GPUI glob imports
        run: ./scripts/check-gpui-imports.sh

      - name: Check GNOME Shell Extension
        run: ./scripts/check-gnome-extension.sh

      - name: Run clippy
        run: cargo clippy --lib -- -D warnings

      - name: Run tests
        run: cargo test --lib

  # Linux: 编译验证 + clippy + 单元测试
  # 注: cargo fmt --check 只需在 macOS job 中运行一次
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-xinput-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-screensaver0-dev \
            libxcb-sync-dev \
            libxcb-xkb-dev

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Forbid GPUI glob imports
        run: ./scripts/check-gpui-imports.sh

      - name: Check GNOME Shell Extension
        run: ./scripts/check-gnome-extension.sh

      - name: Run clippy
        run: cargo clippy --lib -- -D warnings

      - name: Run tests
        run: cargo test --lib

      # cargo check 验证完整二进制可编译（含 GPUI），比 build 更快
      - name: Check full binary compiles
        run: cargo check --release
