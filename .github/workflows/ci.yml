name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 主路径快速门禁：不安装系统依赖、不安装 toolchain，只检查 GPUI-free lib surface。
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show bundled Rust tools
        run: |
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Forbid GPUI glob imports
        run: ./scripts/check-gpui-imports.sh

      - name: Check GNOME Shell Extension
        run: ./scripts/check-gnome-extension.sh

      - name: Run fast lib clippy
        run: cargo clippy --lib --no-default-features -- -D warnings

      - name: Run core tests
        run: cargo test --lib --no-default-features
