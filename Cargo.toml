[package]
name = "bananatray"
version = "0.1.0"
edition = "2021"
description = "A cross-platform system tray application for monitoring AI coding assistant quotas"
license = "MIT"

[lib]
name = "bananatray"
path = "src/lib.rs"

[[bin]]
name = "bananatray"
path = "src/main.rs"

[features]
default = ["app"]
app = []

[dependencies]
adabraka-ui = "0.3.9"
anyhow = "1.0"
async-trait = "0.1"
dirs = "5"
interprocess = "2"
fern = "0.7"
log = "0.4"
regex = "1.10"
gpui = { package = "adabraka-gpui", version = "0.5.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smol = "2"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
base64 = "0.22.1"
ureq = "3"
notify-rust = "4"
portable-pty = "0.8"
which = "6"
rust-i18n = "3"
sys-locale = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }
prost = "0.13"

[target.'cfg(target_os = "macos")'.dependencies]
smappservice-rs = "0.1"

[dev-dependencies]
tempfile = "3"

